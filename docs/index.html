<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>理髮店線上預約</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: auto; }
        .card { margin-top: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; box-shadow: 2px 2px 8px rgba(0,0,0,0.1); }
        .service-item { margin: 12px 0; font-size: 16px; }
        button { width: 100%; padding: 12px; margin-top: 20px; background-color: #00B900; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <h1 style="text-align: center;">💈 理髮店預約系統</h1>
    <div id="status" style="text-align: center;">正在載入 LINE 登入系統...</div>

    <div id="bookingForm" class="card" style="display: none;">
        <h2>歡迎, <span id="displayName"></span>!</h2>
        <h3>請選擇服務項目：</h3>
        <div id="servicesList">載入菜單中...</div>
        <button onclick="submitSelection()">下一步 (選擇時間)</button>
    </div>

    <script>
        const liffId = "2009389155-HyKE5PeC";
        const apiUrl = "https://salon-api-zhou-wei-lun.onrender.com";

        async function initLiff() {
            try {
                await liff.init({ liffId: liffId });
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const profile = await liff.getProfile();
                    document.getElementById('displayName').innerText = profile.displayName;
                    document.getElementById('status').style.display = 'none';
                    document.getElementById('bookingForm').style.display = 'block';
                    loadServices();
                }
            } catch (err) {
                document.getElementById('status').innerText = 'LIFF 初始化失敗';
            }
        }

        async function loadServices() {
            try {
                const response = await fetch(apiUrl + "/api/services");
                const services = await response.json();
                const container = document.getElementById('servicesList');
                container.innerHTML = '';
                
                services.forEach(service => {
                    const div = document.createElement('div');
                    div.className = 'service-item';
                    div.innerHTML = `
                        <label>
                            <input type="checkbox" name="service" value="${service.id}">
                            ${service.name} (${service.duration} 分鐘)
                        </label>
                    `;
                    container.appendChild(div);
                });
            } catch (err) {
                document.getElementById('servicesList').innerHTML = '<span style="color:red;">無法載入菜單，請檢查連線</span>';
            }
        }

        function submitSelection() {
            const selected = Array.from(document.querySelectorAll('input[name="service"]:checked')).map(cb => cb.value);
            if(selected.length === 0) {
                alert('請至少選擇一項服務');
                return;
            }
            alert('已記錄您選擇的服務 ID: ' + selected.join(', ') + '。準備進入時間選擇模組。');
        }

        initLiff();
    </script>
</body>
</html>
