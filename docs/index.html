<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>理髮店線上預約</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: auto; }
        .card { margin-top: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; box-shadow: 2px 2px 8px rgba(0,0,0,0.1); }
        .service-item { margin: 12px 0; font-size: 16px; }
        button { width: 100%; padding: 12px; margin-top: 10px; background-color: #00B900; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }
        .slot-btn { width: 30%; background-color: #f0f0f0; color: #333; margin: 5px 1%; }
        .slot-btn.selected { background-color: #00B900; color: white; }
    </style>
</head>
<body>
    <h1 style="text-align: center;">💈 理髮店預約</h1>
    <div id="status" style="text-align: center;">正在載入 LINE 登入系統...</div>

    <div id="step1" class="card" style="display: none;">
        <h3>1. 請選擇服務項目：</h3>
        <div id="servicesList">載入菜單中...</div>
        <button onclick="goToStep2()">下一步</button>
    </div>

    <div id="step2" class="card" style="display: none;">
        <h3>2. 選擇日期與時間：</h3>
        <input type="date" id="bookDate" onchange="loadSlots()" style="width: 93%; padding: 10px; margin-bottom: 15px;">
        <div id="slotsContainer" style="display: flex; flex-wrap: wrap;">請先選擇日期</div>
        <button onclick="goToStep1()" style="background-color: #aaa;">上一步</button>
        <button onclick="submitBooking()">確認預約</button>
    </div>

    <script>
        const liffId = "2009389155-HyKE5PeC";
        const apiUrl = "https://salon-api-zhou-wei-lun.onrender.com";
        let globalState = { services: [], date: '', time: '', userId: '' };

        async function initLiff() {
            try {
                await liff.init({ liffId: liffId });
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const profile = await liff.getProfile();
                    globalState.userId = profile.userId;
                    document.getElementById('status').style.display = 'none';
                    document.getElementById('step1').style.display = 'block';
                    loadServices();
                    
                    // 限制只能選今天以後的日期
                    const today = new Date().toISOString().split('T')[0];
                    document.getElementById('bookDate').setAttribute('min', today);
                }
            } catch (err) {
                document.getElementById('status').innerText = 'LIFF 初始化失敗';
            }
        }

        async function loadServices() {
            const response = await fetch(apiUrl + "/api/services");
            const services = await response.json();
            const container = document.getElementById('servicesList');
            container.innerHTML = '';
            services.forEach(s => {
                container.innerHTML += `<label class="service-item" style="display:block;"><input type="checkbox" name="service" value="${s.id}"> ${s.name} (${s.duration} 分鐘)</label>`;
            });
        }

        function goToStep2() {
            const selected = Array.from(document.querySelectorAll('input[name="service"]:checked')).map(cb => cb.value);
            if (selected.length === 0) return alert('請至少選擇一項服務');
            globalState.services = selected;
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
        }

        function goToStep1() {
            document.getElementById('step2').style.display = 'none';
            document.getElementById('step1').style.display = 'block';
        }

        async function loadSlots() {
            const date = document.getElementById('bookDate').value;
            if (!date) return;
            globalState.date = date;
            globalState.time = '';
            
            const container = document.getElementById('slotsContainer');
            container.innerHTML = '載入時段中...';
            
            const response = await fetch(`${apiUrl}/api/availability?target_date=${date}`);
            const data = await response.json();
            
            container.innerHTML = '';
            if(data.available_slots.length === 0) {
                container.innerHTML = '此日期無可用時段';
                return;
            }
            
            data.available_slots.forEach(time => {
                const btn = document.createElement('button');
                btn.className = 'slot-btn';
                btn.innerText = time;
                btn.onclick = () => {
                    document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    globalState.time = time;
                };
                container.appendChild(btn);
            });
        }

        async function submitBooking() {
            if (!globalState.date || !globalState.time) return alert('請完整選擇日期與時間');
            
            // 將按鈕文字改成「處理中」，避免客人重複點擊
            const btn = document.querySelector('button[onclick="submitBooking()"]');
            btn.innerText = "預約送出中...";
            btn.disabled = true;

            const payload = {
                user_line_id: globalState.userId,
                service_ids: globalState.services.map(id => parseInt(id)),
                date: globalState.date,
                time: globalState.time
            };

            try {
                const response = await fetch(apiUrl + "/api/appointments", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert("🎉 預約成功！期待您的光臨！");
                    liff.closeWindow(); // 預約成功後自動關閉 LINE LIFF 視窗
                } else {
                    alert("❌ 預約失敗，請稍後再試或聯繫客服。");
                    btn.innerText = "確認預約";
                    btn.disabled = false;
                }
            } catch (err) {
                alert("❌ 連線發生錯誤，請檢查網路狀態。");
                btn.innerText = "確認預約";
                btn.disabled = false;
            }
        }

        initLiff();
    </script>
</body>
</html>
